spring:
    data:
      mongodb:
        uri: ${MONGO_URI}
        database: journaldb
        auto-index-creation: true

    redis:
  #    host: localhost
  #    port: 6379
      host: ${REDIS_HOST}
      port: 15844
      password: ${REDIS_PASSWORD}

    mail:
      host: smtp.gmail.com
      port: 587
      username: ${EMAIL_ID}
      password: ${EMAIL_PASS}
      properties:
        mail:
          smtp:
            auth: true
            starttls:
              enable: true

server:
    port: ${SERVER_PORT}
#    servlet:
 #     context-path: /journal

weather:
  api:
    key: ${WEATHER_API}

springdoc:
  swagger-ui:
    path: /docs

